<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>
</head>

<body>

    <h1>AI Text Summarizer</h1>

    <form method="POST">
        {% csrf_token %}

        <!-- When a browser submits a POST request, Django checks for a valid CSRF token to help prevent malicious websites from submitting forms on a user's behalf.
             Every Django POST form should include {% csrf_token %}. -->

        <textarea name="article" rows="12" cols="80" placeholder="Paste your article here..."></textarea>

        <br><br>

        <button type="submit">
            Summarize
        </button>
    </form>

    {% if summary %}
    <h2>Summary</h2>
    <p>{{ summary }}</p>
    {% endif %}

</body>

</html>
